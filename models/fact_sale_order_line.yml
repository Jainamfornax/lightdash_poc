version: 2

models:
  - name: fact_sales_order_line
    description: "Sale order line details with quantities, pricing, and delivery status"
    columns:
      # --- IDs ---
      - name: id
        description: "Primary key - sale order line ID"
        meta:
          dimension:
            type: number
            hidden: true

      - name: order_id
        description: "Foreign key to sale order"
        meta:
          dimension:
            type: number
            hidden: true

      # --- String Dimensions ---
      - name: order_name
        description: "Sale order reference number"
        meta:
          dimension:
            type: string

      - name: name
        description: "Sale order line name/description"
        meta:
          dimension:
            type: string

      - name: product_id
        description: "Foreign key to product"
        meta:
          dimension:
            type: number
            hidden: true

      - name: product_name
        description: "Product name"
        meta:
          dimension:
            type: string

      - name: company_name
        description: "Customer/company name"
        meta:
          dimension:
            type: string

      - name: order_type
        description: "Type of sale order"
        meta:
          dimension:
            type: string

      - name: sales_remark
        description: "Remarks on the sale order line"
        meta:
          dimension:
            type: string

      - name: delivery_status
        description: "Delivery status of the order line"
        meta:
          dimension:
            type: string

      - name: state
        description: "Order state (draft, sale, done, cancel)"
        meta:
          dimension:
            type: string

      # --- Date ---
      - name: customer_deadline
        description: "Customer requested delivery date"
        meta:
          dimension:
            type: date

      # --- Quantities ---
      - name: ordered_qty
        description: "Quantity ordered"
        meta:
          dimension:
            type: number
          metrics:
            total_ordered_qty:
              type: sum
              label: "Total Ordered Qty"
            avg_ordered_qty:
              type: average
              label: "Avg Ordered Qty"

      - name: qty_delivered
        description: "Quantity delivered"
        meta:
          dimension:
            type: number
          metrics:
            total_qty_delivered:
              type: sum
              label: "Total Qty Delivered"

      - name: qty_invoiced
        description: "Quantity invoiced"
        meta:
          dimension:
            type: number
          metrics:
            total_qty_invoiced:
              type: sum
              label: "Total Qty Invoiced"

      # --- Pricing ---
      - name: price_unit
        description: "Unit price"
        meta:
          dimension:
            type: number
          metrics:
            avg_unit_price:
              type: average
              label: "Avg Unit Price"

      - name: price_tax
        description: "Tax amount"
        meta:
          dimension:
            type: number
          metrics:
            total_tax:
              type: sum
              label: "Total Tax"

      - name: price_total
        description: "Total price including tax"
        meta:
          dimension:
            type: number
          metrics:
            total_revenue:
              type: sum
              label: "Total Revenue"
            avg_order_value:
              type: average
              label: "Avg Order Value"
            order_line_count:
              type: count
              label: "Number of Order Lines"
