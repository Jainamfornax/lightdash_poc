        protein_mix_mtd_revenue:
          type: sum
          sql: "CASE WHEN ${category} = 'Protein Mix' AND EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) AND EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM CURRENT_DATE()) THEN ${net_revenue_inr} ELSE 0 END"
          label: "Protein Mix — MTD Revenue"
          format: "usd"
          round: 0

        protein_mix_ytd_revenue:
          type: sum
          sql: "CASE WHEN ${category} = 'Protein Mix' AND EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) AND ${order_date} <= CURRENT_DATE() THEN ${net_revenue_inr} ELSE 0 END"
          label: "Protein Mix — YTD Revenue"
          format: "usd"
          round: 0

        protein_snack_revenue:
          type: sum
          sql: "CASE WHEN ${category} = 'Protein Snack' THEN ${net_revenue_inr} ELSE 0 END"
          label: "Protein Snack — Revenue"
          format: "usd"
          round: 0

        protein_snack_mtd_revenue:
          type: sum
          sql: "CASE WHEN ${category} = 'Protein Snack' AND EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) AND EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM CURRENT_DATE()) THEN ${net_revenue_inr} ELSE 0 END"
          label: "Protein Snack — MTD Revenue"
          format: "usd"
          round: 0

        protein_snack_ytd_revenue:
          type: sum
          sql: "CASE WHEN ${category} = 'Protein Snack' AND EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) AND ${order_date} <= CURRENT_DATE() THEN ${net_revenue_inr} ELSE 0 END"
          label: "Protein Snack — YTD Revenue"
          format: "usd"
          round: 0

        protein_mix_revenue_pct:
          type: number
          sql: "SAFE_DIVIDE(${protein_mix_revenue}, ${total_net_revenue}) * 100"
          label: "Protein Mix — Revenue %"
          round: 1

# ══════════════════════════════════════════════════════════════
#  DIMENSIONS
# ══════════════════════════════════════════════════════════════
    columns:

      - name: order_id
        description: "Unique order identifier"
        meta:
          dimension:
            type: string
            label: "Order ID"

      - name: customer_id
        meta:
          dimension:
            type: string
            label: "Customer ID"

      - name: product_id
        description: "SKU ID including pack size suffix"
        meta:
          dimension:
            type: string
            label: "Product ID / SKU"

      - name: order_date
        description: "Date the order was placed"
        meta:
          dimension:
            type: date
            label: "Order Date"
            time_intervals: [DAY, WEEK, MONTH, QUARTER, YEAR]

      - name: cohort_month
        description: "Customer first order month YYYY-MM"
        meta:
          dimension:
            type: string
            label: "Cohort Month"

      - name: price_revision_period
        description: "Period 1 Base / Period 2 +14% / Period 3 +18% / Period 4 +13%"
        meta:
          dimension:
            type: string
            label: "Price Revision Period"

      - name: is_new_customer
        meta:
          dimension:
            type: boolean
            label: "New Customer?"

      - name: customer_type
        description: "Derived: New or Repeat"
        meta:
          dimension:
            type: string
            label: "Customer Type"
            sql: "CASE WHEN ${is_new_customer} = TRUE THEN 'New' ELSE 'Repeat' END"

      - name: acquisition_channel
        meta:
          dimension:
            type: string
            label: "Acquisition Channel"

      - name: city
        meta:
          dimension:
            type: string
            label: "City"

      - name: state
        meta:
          dimension:
            type: string
            label: "State"

      - name: payment_method
        meta:
          dimension:
            type: string
            label: "Payment Method"

      - name: order_status
        meta:
          dimension:
            type: string
            label: "Order Status"

      - name: channel
        description: "Amazon / Shopify / TikTok / Flipkart"
        meta:
          dimension:
            type: string
            label: "Channel"

      - name: product_name
        meta:
          dimension:
            type: string
            label: "Product Name"

      - name: flavour
        meta:
          dimension:
            type: string
            label: "Flavour"

      - name: category
        description: "Protein Mix or Protein Snack"
        meta:
          dimension:
            type: string
            label: "Category"

      - name: pack_size
        meta:
          dimension:
            type: number
            label: "Pack Size"

      - name: pack_unit
        description: "lbs or pcs"
        meta:
          dimension:
            type: string
            label: "Pack Unit"

      - name: pack_size_label
        meta:
          dimension:
            type: string
            label: "Pack Size (Label)"
            sql: "CONCAT(CAST(${pack_size} AS STRING), ' ', ${pack_unit})"

      - name: pack_tier
        meta:
          dimension:
            type: string
            label: "Pack Tier"
            sql: "CASE WHEN ${category} = 'Protein Mix' AND ${pack_size} = 2 THEN 'Small (2 lbs)' WHEN ${category} = 'Protein Mix' AND ${pack_size} = 4 THEN 'Medium (4 lbs)' WHEN ${category} = 'Protein Mix' AND ${pack_size} = 8 THEN 'Large (8 lbs)' WHEN ${category} = 'Protein Snack' AND ${pack_size} = 6 THEN 'Small (6 pcs)' WHEN ${category} = 'Protein Snack' AND ${pack_size} = 12 THEN 'Medium (12 pcs)' WHEN ${category} = 'Protein Snack' AND ${pack_size} = 24 THEN 'Large (24 pcs)' WHEN ${category} = 'Protein Snack' AND ${pack_size} = 48 THEN 'XL (48 pcs)' ELSE 'Unknown' END"

      - name: gross_revenue_inr
        meta:
          dimension:
            type: number
            label: "Gross Revenue (raw)"
            hidden: true

      - name: discount_amount_inr
        meta:
          dimension:
            type: number
            label: "Discount Amount (raw)"
            hidden: true

      - name: returns_amount_inr
        meta:
          dimension:
            type: number
            label: "Returns Amount (raw)"
            hidden: true

      - name: net_revenue_inr
        meta:
          dimension:
            type: number
            label: "Net Revenue (raw)"
            hidden: true

      - name: cogs_inr
        meta:
          dimension:
            type: number
            label: "COGS (raw)"
            hidden: true

      - name: allocated_mktg_spend_inr
        meta:
          dimension:
            type: number
            label: "Mktg Spend (raw)"
            hidden: true

      - name: allocated_ops_cost_inr
        meta:
          dimension:
            type: number
            label: "Ops Cost (raw)"
            hidden: true

      - name: unit_price_inr
        meta:
          dimension:
            type: number
            label: "Unit Price (raw)"
            hidden: true

      - name: quantity
        meta:
          dimension:
            type: number
            label: "Quantity"