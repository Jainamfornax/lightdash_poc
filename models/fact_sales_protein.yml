version: 2

# ══════════════════════════════════════════════════════════════
#  LIGHTDASH POC — Protein Brand D2C
#  Model     : fact_sales_protein
#  Warehouse : BigQuery (linked-368910 / lightdash_poc)
#  Currency  : USD
#  Every metric group has: Total | MTD | Prev MTD | MoM% |
#                          QTD | YTD | Prev YTD | YoY% | L7D | L30D | L90D
# ══════════════════════════════════════════════════════════════

models:
  - name: fact_sales_protein
    description: >
      Wide denormalised sales fact for the protein brand POC.
      Jan 2025 to Apr 2026. Amazon, Shopify, TikTok, Flipkart.

    meta:
      label: "Protein Brand Sales"
      metrics:

# ╔══════════════════════════════════════════════════════════════╗
# ║  1. GROSS REVENUE                                           ║
# ╚══════════════════════════════════════════════════════════════╝

        total_gross_revenue:
          type: sum
          sql: ${gross_revenue_inr}
          label: "Gross Revenue"
          description: "Revenue before discounts and returns"
          format: "usd"
          round: 0

        mtd_gross_revenue:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) AND EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM CURRENT_DATE()) THEN ${gross_revenue_inr} ELSE 0 END"
          label: "Gross Revenue — MTD"
          format: "usd"
          round: 0

        prev_mtd_gross_revenue:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH)) AND EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH)) AND EXTRACT(DAY FROM ${order_date}) <= EXTRACT(DAY FROM CURRENT_DATE()) THEN ${gross_revenue_inr} ELSE 0 END"
          label: "Gross Revenue — Prev MTD"
          format: "usd"
          round: 0

        mom_gross_revenue_pct:
          type: number
          sql: "SAFE_DIVIDE(${mtd_gross_revenue} - ${prev_mtd_gross_revenue}, ${prev_mtd_gross_revenue}) * 100"
          label: "Gross Revenue — MoM %"
          round: 1

        qtd_gross_revenue:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) AND EXTRACT(QUARTER FROM ${order_date}) = EXTRACT(QUARTER FROM CURRENT_DATE()) THEN ${gross_revenue_inr} ELSE 0 END"
          label: "Gross Revenue — QTD"
          format: "usd"
          round: 0

        ytd_gross_revenue:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) AND ${order_date} <= CURRENT_DATE() THEN ${gross_revenue_inr} ELSE 0 END"
          label: "Gross Revenue — YTD"
          format: "usd"
          round: 0

        prev_ytd_gross_revenue:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) - 1 AND (EXTRACT(MONTH FROM ${order_date}) < EXTRACT(MONTH FROM CURRENT_DATE()) OR (EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM CURRENT_DATE()) AND EXTRACT(DAY FROM ${order_date}) <= EXTRACT(DAY FROM CURRENT_DATE()))) THEN ${gross_revenue_inr} ELSE 0 END"
          label: "Gross Revenue — Prev YTD"
          format: "usd"
          round: 0

        yoy_gross_revenue_pct:
          type: number
          sql: "SAFE_DIVIDE(${ytd_gross_revenue} - ${prev_ytd_gross_revenue}, ${prev_ytd_gross_revenue}) * 100"
          label: "Gross Revenue — YoY %"
          round: 1

        l7d_gross_revenue:
          type: sum
          sql: "CASE WHEN ${order_date} >= DATE_SUB(CURRENT_DATE(), INTERVAL 7 DAY) THEN ${gross_revenue_inr} ELSE 0 END"
          label: "Gross Revenue — Last 7D"
          format: "usd"
          round: 0

        l30d_gross_revenue:
          type: sum
          sql: "CASE WHEN ${order_date} >= DATE_SUB(CURRENT_DATE(), INTERVAL 30 DAY) THEN ${gross_revenue_inr} ELSE 0 END"
          label: "Gross Revenue — Last 30D"
          format: "usd"
          round: 0

        l90d_gross_revenue:
          type: sum
          sql: "CASE WHEN ${order_date} >= DATE_SUB(CURRENT_DATE(), INTERVAL 90 DAY) THEN ${gross_revenue_inr} ELSE 0 END"
          label: "Gross Revenue — Last 90D"
          format: "usd"
          round: 0

# ╔══════════════════════════════════════════════════════════════╗
# ║  2. NET REVENUE                                             ║
# ╚══════════════════════════════════════════════════════════════╝

        total_net_revenue:
          type: sum
          sql: ${net_revenue_inr}
          label: "Net Revenue"
          description: "Gross revenue minus discounts and returns"
          format: "usd"
          round: 0

        mtd_net_revenue:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) AND EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM CURRENT_DATE()) THEN ${net_revenue_inr} ELSE 0 END"
          label: "Net Revenue — MTD"
          format: "usd"
          round: 0

        prev_mtd_net_revenue:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH)) AND EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH)) AND EXTRACT(DAY FROM ${order_date}) <= EXTRACT(DAY FROM CURRENT_DATE()) THEN ${net_revenue_inr} ELSE 0 END"
          label: "Net Revenue — Prev MTD"
          format: "usd"
          round: 0

        mom_net_revenue_pct:
          type: number
          sql: "SAFE_DIVIDE(${mtd_net_revenue} - ${prev_mtd_net_revenue}, ${prev_mtd_net_revenue}) * 100"
          label: "Net Revenue — MoM %"
          round: 1

        qtd_net_revenue:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) AND EXTRACT(QUARTER FROM ${order_date}) = EXTRACT(QUARTER FROM CURRENT_DATE()) THEN ${net_revenue_inr} ELSE 0 END"
          label: "Net Revenue — QTD"
          format: "usd"
          round: 0

        ytd_net_revenue:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) AND ${order_date} <= CURRENT_DATE() THEN ${net_revenue_inr} ELSE 0 END"
          label: "Net Revenue — YTD"
          format: "usd"
          round: 0

        prev_ytd_net_revenue:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) - 1 AND (EXTRACT(MONTH FROM ${order_date}) < EXTRACT(MONTH FROM CURRENT_DATE()) OR (EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM CURRENT_DATE()) AND EXTRACT(DAY FROM ${order_date}) <= EXTRACT(DAY FROM CURRENT_DATE()))) THEN ${net_revenue_inr} ELSE 0 END"
          label: "Net Revenue — Prev YTD"
          format: "usd"
          round: 0

        yoy_net_revenue_pct:
          type: number
          sql: "SAFE_DIVIDE(${ytd_net_revenue} - ${prev_ytd_net_revenue}, ${prev_ytd_net_revenue}) * 100"
          label: "Net Revenue — YoY %"
          round: 1

        l7d_net_revenue:
          type: sum
          sql: "CASE WHEN ${order_date} >= DATE_SUB(CURRENT_DATE(), INTERVAL 7 DAY) THEN ${net_revenue_inr} ELSE 0 END"
          label: "Net Revenue — Last 7D"
          format: "usd"
          round: 0

        l30d_net_revenue:
          type: sum
          sql: "CASE WHEN ${order_date} >= DATE_SUB(CURRENT_DATE(), INTERVAL 30 DAY) THEN ${net_revenue_inr} ELSE 0 END"
          label: "Net Revenue — Last 30D"
          format: "usd"
          round: 0

        l90d_net_revenue:
          type: sum
          sql: "CASE WHEN ${order_date} >= DATE_SUB(CURRENT_DATE(), INTERVAL 90 DAY) THEN ${net_revenue_inr} ELSE 0 END"
          label: "Net Revenue — Last 90D"
          format: "usd"
          round: 0

        wow_net_revenue_pct:
          type: number
          sql: "SAFE_DIVIDE(SUM(CASE WHEN ${order_date} >= DATE_SUB(CURRENT_DATE(), INTERVAL 7 DAY) THEN ${net_revenue_inr} ELSE 0 END) - SUM(CASE WHEN ${order_date} >= DATE_SUB(CURRENT_DATE(), INTERVAL 14 DAY) AND ${order_date} < DATE_SUB(CURRENT_DATE(), INTERVAL 7 DAY) THEN ${net_revenue_inr} ELSE 0 END), SUM(CASE WHEN ${order_date} >= DATE_SUB(CURRENT_DATE(), INTERVAL 14 DAY) AND ${order_date} < DATE_SUB(CURRENT_DATE(), INTERVAL 7 DAY) THEN ${net_revenue_inr} ELSE 0 END)) * 100"
          label: "Net Revenue — WoW %"
          round: 1

# ╔══════════════════════════════════════════════════════════════╗
# ║  3. DISCOUNT                                                ║
# ╚══════════════════════════════════════════════════════════════╝

        total_discount:
          type: sum
          sql: ${discount_amount_inr}
          label: "Discount"
          format: "usd"
          round: 0

        mtd_discount:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) AND EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM CURRENT_DATE()) THEN ${discount_amount_inr} ELSE 0 END"
          label: "Discount — MTD"
          format: "usd"
          round: 0

        prev_mtd_discount:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH)) AND EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH)) AND EXTRACT(DAY FROM ${order_date}) <= EXTRACT(DAY FROM CURRENT_DATE()) THEN ${discount_amount_inr} ELSE 0 END"
          label: "Discount — Prev MTD"
          format: "usd"
          round: 0

        mom_discount_pct:
          type: number
          sql: "SAFE_DIVIDE(${mtd_discount} - ${prev_mtd_discount}, ${prev_mtd_discount}) * 100"
          label: "Discount — MoM %"
          round: 1

        ytd_discount:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) AND ${order_date} <= CURRENT_DATE() THEN ${discount_amount_inr} ELSE 0 END"
          label: "Discount — YTD"
          format: "usd"
          round: 0

        prev_ytd_discount:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) - 1 AND (EXTRACT(MONTH FROM ${order_date}) < EXTRACT(MONTH FROM CURRENT_DATE()) OR (EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM CURRENT_DATE()) AND EXTRACT(DAY FROM ${order_date}) <= EXTRACT(DAY FROM CURRENT_DATE()))) THEN ${discount_amount_inr} ELSE 0 END"
          label: "Discount — Prev YTD"
          format: "usd"
          round: 0

        discount_rate_pct:
          type: number
          sql: "SAFE_DIVIDE(${total_discount}, ${total_gross_revenue}) * 100"
          label: "Discount Rate %"
          round: 1

# ╔══════════════════════════════════════════════════════════════╗
# ║  4. RETURNS                                                 ║
# ╚══════════════════════════════════════════════════════════════╝

        total_returns:
          type: sum
          sql: ${returns_amount_inr}
          label: "Returns"
          format: "usd"
          round: 0

        mtd_returns:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) AND EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM CURRENT_DATE()) THEN ${returns_amount_inr} ELSE 0 END"
          label: "Returns — MTD"
          format: "usd"
          round: 0

        prev_mtd_returns:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH)) AND EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH)) AND EXTRACT(DAY FROM ${order_date}) <= EXTRACT(DAY FROM CURRENT_DATE()) THEN ${returns_amount_inr} ELSE 0 END"
          label: "Returns — Prev MTD"
          format: "usd"
          round: 0

        ytd_returns:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) AND ${order_date} <= CURRENT_DATE() THEN ${returns_amount_inr} ELSE 0 END"
          label: "Returns — YTD"
          format: "usd"
          round: 0

        prev_ytd_returns:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) - 1 AND (EXTRACT(MONTH FROM ${order_date}) < EXTRACT(MONTH FROM CURRENT_DATE()) OR (EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM CURRENT_DATE()) AND EXTRACT(DAY FROM ${order_date}) <= EXTRACT(DAY FROM CURRENT_DATE()))) THEN ${returns_amount_inr} ELSE 0 END"
          label: "Returns — Prev YTD"
          format: "usd"
          round: 0

        return_rate_pct:
          type: number
          sql: "SAFE_DIVIDE(${total_returns}, ${total_gross_revenue}) * 100"
          label: "Return Rate %"
          round: 1

# ╔══════════════════════════════════════════════════════════════╗
# ║  5. ORDERS                                                  ║
# ╚══════════════════════════════════════════════════════════════╝

        total_orders:
          type: count_distinct
          sql: ${order_id}
          label: "Orders"

        mtd_orders:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) AND EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM CURRENT_DATE()) THEN 1 ELSE 0 END"
          label: "Orders — MTD"

        prev_mtd_orders:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH)) AND EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH)) AND EXTRACT(DAY FROM ${order_date}) <= EXTRACT(DAY FROM CURRENT_DATE()) THEN 1 ELSE 0 END"
          label: "Orders — Prev MTD"

        mom_orders_pct:
          type: number
          sql: "SAFE_DIVIDE(${mtd_orders} - ${prev_mtd_orders}, ${prev_mtd_orders}) * 100"
          label: "Orders — MoM %"
          round: 1

        qtd_orders:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) AND EXTRACT(QUARTER FROM ${order_date}) = EXTRACT(QUARTER FROM CURRENT_DATE()) THEN 1 ELSE 0 END"
          label: "Orders — QTD"

        ytd_orders:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) AND ${order_date} <= CURRENT_DATE() THEN 1 ELSE 0 END"
          label: "Orders — YTD"

        prev_ytd_orders:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) - 1 AND (EXTRACT(MONTH FROM ${order_date}) < EXTRACT(MONTH FROM CURRENT_DATE()) OR (EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM CURRENT_DATE()) AND EXTRACT(DAY FROM ${order_date}) <= EXTRACT(DAY FROM CURRENT_DATE()))) THEN 1 ELSE 0 END"
          label: "Orders — Prev YTD"

        yoy_orders_pct:
          type: number
          sql: "SAFE_DIVIDE(${ytd_orders} - ${prev_ytd_orders}, ${prev_ytd_orders}) * 100"
          label: "Orders — YoY %"
          round: 1

        l7d_orders:
          type: sum
          sql: "CASE WHEN ${order_date} >= DATE_SUB(CURRENT_DATE(), INTERVAL 7 DAY) THEN 1 ELSE 0 END"
          label: "Orders — Last 7D"

        l30d_orders:
          type: sum
          sql: "CASE WHEN ${order_date} >= DATE_SUB(CURRENT_DATE(), INTERVAL 30 DAY) THEN 1 ELSE 0 END"
          label: "Orders — Last 30D"

        new_customer_orders:
          type: sum
          sql: "CASE WHEN ${is_new_customer} = TRUE THEN 1 ELSE 0 END"
          label: "Orders — New Customers"

        repeat_customer_orders:
          type: sum
          sql: "CASE WHEN ${is_new_customer} = FALSE THEN 1 ELSE 0 END"
          label: "Orders — Repeat Customers"

        repeat_order_rate_pct:
          type: number
          sql: "SAFE_DIVIDE(${repeat_customer_orders}, ${total_orders}) * 100"
          label: "Repeat Order Rate %"
          round: 1

# ╔══════════════════════════════════════════════════════════════╗
# ║  6. AOV                                                     ║
# ╚══════════════════════════════════════════════════════════════╝

        avg_order_value:
          type: number
          sql: "SAFE_DIVIDE(${total_net_revenue}, ${total_orders})"
          label: "AOV"
          format: "usd"
          round: 0

        mtd_aov:
          type: number
          sql: "SAFE_DIVIDE(${mtd_net_revenue}, ${mtd_orders})"
          label: "AOV — MTD"
          format: "usd"
          round: 0

        prev_mtd_aov:
          type: number
          sql: "SAFE_DIVIDE(${prev_mtd_net_revenue}, ${prev_mtd_orders})"
          label: "AOV — Prev MTD"
          format: "usd"
          round: 0

        mom_aov_pct:
          type: number
          sql: "SAFE_DIVIDE(${mtd_aov} - ${prev_mtd_aov}, ${prev_mtd_aov}) * 100"
          label: "AOV — MoM %"
          round: 1

        ytd_aov:
          type: number
          sql: "SAFE_DIVIDE(${ytd_net_revenue}, ${ytd_orders})"
          label: "AOV — YTD"
          format: "usd"
          round: 0

        prev_ytd_aov:
          type: number
          sql: "SAFE_DIVIDE(${prev_ytd_net_revenue}, ${prev_ytd_orders})"
          label: "AOV — Prev YTD"
          format: "usd"
          round: 0

        yoy_aov_pct:
          type: number
          sql: "SAFE_DIVIDE(${ytd_aov} - ${prev_ytd_aov}, ${prev_ytd_aov}) * 100"
          label: "AOV — YoY %"
          round: 1

        aov_new_customers:
          type: number
          sql: "SAFE_DIVIDE(SUM(CASE WHEN ${is_new_customer} = TRUE THEN ${net_revenue_inr} ELSE 0 END), SUM(CASE WHEN ${is_new_customer} = TRUE THEN 1 ELSE 0 END))"
          label: "AOV — New Customers"
          format: "usd"
          round: 0

        aov_repeat_customers:
          type: number
          sql: "SAFE_DIVIDE(SUM(CASE WHEN ${is_new_customer} = FALSE THEN ${net_revenue_inr} ELSE 0 END), SUM(CASE WHEN ${is_new_customer} = FALSE THEN 1 ELSE 0 END))"
          label: "AOV — Repeat Customers"
          format: "usd"
          round: 0

# ╔══════════════════════════════════════════════════════════════╗
# ║  7. CUSTOMERS                                               ║
# ╚══════════════════════════════════════════════════════════════╝

        unique_customers:
          type: count_distinct
          sql: ${customer_id}
          label: "Customers"

        new_customers:
          type: count_distinct
          sql: "CASE WHEN ${is_new_customer} = TRUE THEN ${customer_id} ELSE NULL END"
          label: "New Customers"

        repeat_customers:
          type: count_distinct
          sql: "CASE WHEN ${is_new_customer} = FALSE THEN ${customer_id} ELSE NULL END"
          label: "Repeat Customers"

        mtd_new_customers:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) AND EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM CURRENT_DATE()) AND ${is_new_customer} = TRUE THEN 1 ELSE 0 END"
          label: "New Customers — MTD"

        prev_mtd_new_customers:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH)) AND EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH)) AND EXTRACT(DAY FROM ${order_date}) <= EXTRACT(DAY FROM CURRENT_DATE()) AND ${is_new_customer} = TRUE THEN 1 ELSE 0 END"
          label: "New Customers — Prev MTD"

        mom_new_customers_pct:
          type: number
          sql: "SAFE_DIVIDE(${mtd_new_customers} - ${prev_mtd_new_customers}, ${prev_mtd_new_customers}) * 100"
          label: "New Customers — MoM %"
          round: 1

        ytd_new_customers:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) AND ${order_date} <= CURRENT_DATE() AND ${is_new_customer} = TRUE THEN 1 ELSE 0 END"
          label: "New Customers — YTD"

        prev_ytd_new_customers:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) - 1 AND (EXTRACT(MONTH FROM ${order_date}) < EXTRACT(MONTH FROM CURRENT_DATE()) OR (EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM CURRENT_DATE()) AND EXTRACT(DAY FROM ${order_date}) <= EXTRACT(DAY FROM CURRENT_DATE()))) AND ${is_new_customer} = TRUE THEN 1 ELSE 0 END"
          label: "New Customers — Prev YTD"

        yoy_new_customers_pct:
          type: number
          sql: "SAFE_DIVIDE(${ytd_new_customers} - ${prev_ytd_new_customers}, ${prev_ytd_new_customers}) * 100"
          label: "New Customers — YoY %"
          round: 1

        customer_repeat_rate_pct:
          type: number
          sql: "SAFE_DIVIDE(${repeat_customers}, ${unique_customers}) * 100"
          label: "Customer Repeat Rate %"
          round: 1

        avg_orders_per_customer:
          type: number
          sql: "SAFE_DIVIDE(${total_orders}, ${unique_customers})"
          label: "Avg Orders per Customer"
          round: 1

        revenue_per_customer:
          type: number
          sql: "SAFE_DIVIDE(${total_net_revenue}, ${unique_customers})"
          label: "Revenue per Customer"
          format: "usd"
          round: 0

# ╔══════════════════════════════════════════════════════════════╗
# ║  8. COGS                                                    ║
# ╚══════════════════════════════════════════════════════════════╝

        total_cogs:
          type: sum
          sql: ${cogs_inr}
          label: "COGS"
          format: "usd"
          round: 0

        mtd_cogs:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) AND EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM CURRENT_DATE()) THEN ${cogs_inr} ELSE 0 END"
          label: "COGS — MTD"
          format: "usd"
          round: 0

        prev_mtd_cogs:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH)) AND EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH)) AND EXTRACT(DAY FROM ${order_date}) <= EXTRACT(DAY FROM CURRENT_DATE()) THEN ${cogs_inr} ELSE 0 END"
          label: "COGS — Prev MTD"
          format: "usd"
          round: 0

        ytd_cogs:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) AND ${order_date} <= CURRENT_DATE() THEN ${cogs_inr} ELSE 0 END"
          label: "COGS — YTD"
          format: "usd"
          round: 0

        prev_ytd_cogs:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) - 1 AND (EXTRACT(MONTH FROM ${order_date}) < EXTRACT(MONTH FROM CURRENT_DATE()) OR (EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM CURRENT_DATE()) AND EXTRACT(DAY FROM ${order_date}) <= EXTRACT(DAY FROM CURRENT_DATE()))) THEN ${cogs_inr} ELSE 0 END"
          label: "COGS — Prev YTD"
          format: "usd"
          round: 0

# ╔══════════════════════════════════════════════════════════════╗
# ║  9. CM1  (Net Revenue − COGS)                              ║
# ╚══════════════════════════════════════════════════════════════╝

        cm1:
          type: number
          sql: "${total_net_revenue} - ${total_cogs}"
          label: "CM1"
          description: "Net Revenue minus COGS"
          format: "usd"
          round: 0

        cm1_pct:
          type: number
          sql: "SAFE_DIVIDE(${cm1}, ${total_net_revenue}) * 100"
          label: "CM1 %"
          round: 1

        mtd_cm1:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) AND EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM CURRENT_DATE()) THEN ${net_revenue_inr} - ${cogs_inr} ELSE 0 END"
          label: "CM1 — MTD"
          format: "usd"
          round: 0

        prev_mtd_cm1:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH)) AND EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH)) AND EXTRACT(DAY FROM ${order_date}) <= EXTRACT(DAY FROM CURRENT_DATE()) THEN ${net_revenue_inr} - ${cogs_inr} ELSE 0 END"
          label: "CM1 — Prev MTD"
          format: "usd"
          round: 0

        mom_cm1_pct:
          type: number
          sql: "SAFE_DIVIDE(${mtd_cm1} - ${prev_mtd_cm1}, ${prev_mtd_cm1}) * 100"
          label: "CM1 — MoM %"
          round: 1

        qtd_cm1:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) AND EXTRACT(QUARTER FROM ${order_date}) = EXTRACT(QUARTER FROM CURRENT_DATE()) THEN ${net_revenue_inr} - ${cogs_inr} ELSE 0 END"
          label: "CM1 — QTD"
          format: "usd"
          round: 0

        ytd_cm1:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) AND ${order_date} <= CURRENT_DATE() THEN ${net_revenue_inr} - ${cogs_inr} ELSE 0 END"
          label: "CM1 — YTD"
          format: "usd"
          round: 0

        prev_ytd_cm1:
          type: sum
          sql: "CASE WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) - 1 AND (EXTRACT(MONTH FROM ${order_date}) < EXTRACT(MONTH FROM CURRENT_DATE()) OR (EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM CURRENT_DATE()) AND EXTRACT(DAY FROM ${order_date}) <= EXTRACT(DAY FROM CURRENT_DATE()))) THEN ${net_revenue_inr} - ${cogs_inr} ELSE 0 END"
          label: "CM1 — Prev YTD"
          format: "usd"
          round: 0

        yoy_cm1_pct:
          type: number
          sql: "SAFE_DIVIDE(${ytd_cm1} - ${prev_ytd_cm1}, ${prev_ytd_cm1}) * 100"
          label: "CM1 — YoY %"
          round: 1

        l30d_cm1:
          type: sum
          sql: "CASE WHEN ${order_date} >= DATE_SUB(CURRENT_DATE(), INTERVAL 30 DAY) THEN ${net_revenue_inr} - ${cogs_inr} ELSE 0 END"
          label: "CM1 — Last 30D"
          format: "usd"
          round: 0

        cm1_per_unit:
          type: number
          sql: "SAFE_DIVIDE(${cm1}, ${total_units_sold})"
          label: "CM1 per Unit"
          format: "usd"
          round: 0

