version: 2

models:
  - name: fact_sales_for_protein_company
    description: "D2C protein supplement sales transactions across channels"

    meta:
      label: "Protein Sales"

      metrics:
        total_revenue:
          type: sum
          sql: ${revenue}
          label: "Total Revenue"
          format: usd
          round: 2

        ytd_revenue:
          type: sum
          sql: CASE
                WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE())
                 AND ${order_date} <= CURRENT_DATE()
                THEN ${revenue}
                ELSE 0
              END
          label: "YTD Revenue"
          format: usd
          round: 2

        mtd_revenue:
          type: sum
          sql: CASE
                WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE())
                 AND EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM CURRENT_DATE())
                 AND ${order_date} <= CURRENT_DATE()
                THEN ${revenue}
                ELSE 0
              END
          label: "MTD Revenue"
          format: usd
          round: 2

        previous_mtd_revenue:
          type: sum
          sql: CASE
                WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH))
                 AND EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH))
                 AND EXTRACT(DAY FROM ${order_date}) <= EXTRACT(DAY FROM CURRENT_DATE())
                THEN ${revenue}
                ELSE 0
              END
          label: "Previous MTD Revenue"
          format: usd
          round: 2

        previous_year_revenue:
          type: sum
          sql: CASE
                WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) - 1
                 AND EXTRACT(MONTH FROM ${order_date}) <= EXTRACT(MONTH FROM CURRENT_DATE())
                 AND (
                      EXTRACT(MONTH FROM ${order_date}) < EXTRACT(MONTH FROM CURRENT_DATE())
                      OR EXTRACT(DAY FROM ${order_date}) <= EXTRACT(DAY FROM CURRENT_DATE())
                 )
                THEN ${revenue}
                ELSE 0
              END
          label: "Previous Year Revenue"
          format: usd
          round: 2

        last_30d_revenue:
          type: sum
          sql: CASE
                WHEN ${order_date} >= DATE_SUB(CURRENT_DATE(), INTERVAL 30 DAY)
                THEN ${revenue}
                ELSE 0
              END
          label: "Last 30D Revenue"
          format: usd
          round: 2

        total_gross_profit:
          type: sum
          sql: ${gross_profit}
          label: "Total Gross Profit"
          format: usd
          round: 2

        ytd_gross_profit:
          type: sum
          sql: CASE
                WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE())
                 AND ${order_date} <= CURRENT_DATE()
                THEN ${gross_profit}
                ELSE 0
              END
          label: "YTD Gross Profit"
          format: usd
          round: 2

        mtd_gross_profit:
          type: sum
          sql: CASE
                WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE())
                 AND EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM CURRENT_DATE())
                 AND ${order_date} <= CURRENT_DATE()
                THEN ${gross_profit}
                ELSE 0
              END
          label: "MTD Gross Profit"
          format: usd
          round: 2

        previous_mtd_gross_profit:
          type: sum
          sql: CASE
                WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH))
                 AND EXTRACT(MONTH FROM ${order_date}) = EXTRACT(MONTH FROM DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH))
                 AND EXTRACT(DAY FROM ${order_date}) <= EXTRACT(DAY FROM CURRENT_DATE())
                THEN ${gross_profit}
                ELSE 0
              END
          label: "Previous MTD Gross Profit"
          format: usd
          round: 2

        previous_year_gross_profit:
          type: sum
          sql: CASE
                WHEN EXTRACT(YEAR FROM ${order_date}) = EXTRACT(YEAR FROM CURRENT_DATE()) - 1
                 AND EXTRACT(MONTH FROM ${order_date}) <= EXTRACT(MONTH FROM CURRENT_DATE())
                 AND (
                      EXTRACT(MONTH FROM ${order_date}) < EXTRACT(MONTH FROM CURRENT_DATE())
                      OR EXTRACT(DAY FROM ${order_date}) <= EXTRACT(DAY FROM CURRENT_DATE())
                 )
                THEN ${gross_profit}
                ELSE 0
              END
          label: "Previous Year Gross Profit"
          format: usd
          round: 2

        last_30d_gross_profit:
          type: sum
          sql: CASE
                WHEN ${order_date} >= DATE_SUB(CURRENT_DATE(), INTERVAL 30 DAY)
                THEN ${gross_profit}
                ELSE 0
              END
          label: "Last 30D Gross Profit"
          format: usd
          round: 2

        total_discount:
          type: sum
          sql: ${discount}
          label: "Total Discount"
          format: usd
          round: 2

        total_units_sold:
          type: sum
          sql: ${units_sold}
          label: "Total Units Sold"
          round: 2

        avg_units_sold:
          type: average
          sql: ${units_sold}
          label: "Avg Units Sold"
          round: 2

        avg_unit_price:
          type: average
          sql: ${unit_price}
          label: "Avg Unit Price"
          format: usd
          round: 2

        unique_orders:
          type: count_distinct
          sql: ${order_id}
          label: "Unique Orders"

        unique_customers:
          type: count_distinct
          sql: ${customer_name}
          label: "Unique Customers"

        unique_skus:
          type: count_distinct
          sql: ${sku}
          label: "Unique SKUs"

        avg_order_value:
          type: number
          sql: SAFE_DIVIDE(${total_revenue}, ${unique_orders})
          label: "Avg Order Value"
          format: usd
          round: 2

        gross_margin_pct:
          type: number
          sql: SAFE_DIVIDE(${total_gross_profit}, ${total_revenue})
          label: "Gross Margin %"
          format: percent
          round: 2

    columns:
      - name: order_id
        meta:
          dimension:
            type: string

      - name: order_date
        meta:
          dimension:
            type: date
            time_intervals: [DAY, WEEK, MONTH, QUARTER, YEAR]

      - name: month
        meta:
          dimension:
            type: string

      - name: customer_name
        meta:
          dimension:
            type: string

      - name: region
        meta:
          dimension:
            type: string

      - name: channel
        meta:
          dimension:
            type: string

      - name: product_category
        meta:
          dimension:
            type: string

      - name: sku
        meta:
          dimension:
            type: string

      - name: product_name
        meta:
          dimension:
            type: string

      - name: pack_size
        meta:
          dimension:
            type: string

      - name: new_product_flag
        meta:
          dimension:
            type: string

      - name: ad_converted_flag
        meta:
          dimension:
            type: string

      - name: promo_code
        meta:
          dimension:
            type: string

      - name: units_sold
        meta:
          dimension:
            type: number
            round: 2

      - name: unit_price
        meta:
          dimension:
            type: number
            round: 2

      - name: revenue
        meta:
          dimension:
            type: number
            round: 2

      - name: discount
        meta:
          dimension:
            type: number
            round: 2

      - name: cogs
        meta:
          dimension:
            type: number
            round: 2

      - name: channel_fee
        meta:
          dimension:
            type: number
            round: 2

      - name: gross_profit
        meta:
          dimension:
            type: number
            round: 2